<!DOCTYPE html>
<html>
<head>
    <title>{{ category }} | The Projectree</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #061a12; color: #f8f9fa; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; padding: 25px; }
    </style>
</head>
<body>
    <div class="container py-5">
        <a href="/" class="text-success text-decoration-none">← Back to Home</a>
        <h1 class="mt-4 mb-5">{{ category }}</h1>
        <div class="row g-4">
            {% for p in projects %}
            <div class="col-md-6">
                <div class="glass-card">
                    <div class="d-flex justify-content-between">
                        <span class="badge bg-success mb-3">{{ p.language }}</span>
                        <small class="opacity-50">{{ p.level }}</small>
                    </div>
                    <h3>{{ p.title }}</h3>
                    <p class="opacity-75">{{ p.description }}</p>
                    <a href="/project/{{ p.id }}" class="btn btn-outline-light w-100 mt-3">View Project</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>

{% extends 'base.html' %}
{% block title %}Login — Projectree{% endblock %}

{% block content %}
<div class="container py-5 mt-4" style="max-width: 460px;">
  <div class="text-center mb-4">
    <h1 class="display-6 fw-bold text-white">🌳 Welcome Back</h1>
    <p class="text-white-50">Sign in to track your project journey</p>
  </div>

  <div class="card border-0 shadow-lg" style="background: rgba(4,13,10,0.85); border: 1px solid rgba(45,106,79,0.3) !important; border-radius: 20px; backdrop-filter: blur(10px);">
    <div class="card-body p-4">
      <form method="POST" action="/login">
        <div class="mb-3">
          <label class="form-label text-white-50 small fw-semibold">EMAIL</label>
          <input type="email" name="email" class="form-control bg-dark text-white border-secondary"
                 placeholder="you@example.com" required style="border-radius: 12px; padding: 12px 16px;">
        </div>
        <div class="mb-4">
          <label class="form-label text-white-50 small fw-semibold">PASSWORD</label>
          <input type="password" name="password" class="form-control bg-dark text-white border-secondary"
                 placeholder="••••••••" required style="border-radius: 12px; padding: 12px 16px;">
        </div>
        <button type="submit" class="btn btn-success w-100 py-3 fw-bold" style="border-radius: 12px; background: linear-gradient(135deg, #2d6a4f, #40916c); border: none; font-size: 1rem;">
          🚀 Login to Projectree
        </button>
      </form>
      <hr class="border-secondary my-4">
      <p class="text-center text-white-50 mb-0 small">
        No account? <a href="/register" class="text-success fw-bold text-decoration-none">Register here →</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}

<!DOCTYPE html>
<html>
<head>
    <title>Engineering Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 60px; font-family: 'Inter', sans-serif; background: #fff; color: #111; }
        .mastery { border-left: 5px solid #2d6a4f; padding-left: 25px; margin-bottom: 50px; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h1 class="fw-bold">Engineering Portfolio</h1>
            <button onclick="window.print()" class="btn btn-dark no-print">Print to PDF</button>
        </div>
        <p class="lead">Vetted Technical Projects via Projectree</p>
        <hr class="mb-5">

        {% for p in projects %}
        <div class="mastery">
            <h2 class="fw-bold">{{ p.title }}</h2>
            <p class="text-success fw-bold">{{ p.language }} • {{ p.interest }}</p>
            <p><b>Technical Scope:</b> {{ p.description }}</p>
            <p><b>Verified Output:</b> {{ p.expected_output }}</p>
        </div>
        {% endfor %}
    </div>
</body>
</html>
